<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorer</title>
</head>

<body>
    <script>
        /* 8. Object */

        let obj = {
            name: "Shoxruh",
            age: 15,
            score: 100
        };

        /* 95 = A */
        /* 80 = B */
        /* 60 = C */

        function scorer(obj) {
            if (obj.score >= 95) {
                console.log(obj.name + ": A");
            }
            else if (obj.score >= 80) {
                console.log(obj.name + ": B");
            }
            else if (obj.score >= 60) {
                console.log(obj.name + ": C");
            }
            else {
                console.log(obj.name + ": Your score is below 60");
            }
        }

        scorer(obj);
    </script>
</body>

</html>
