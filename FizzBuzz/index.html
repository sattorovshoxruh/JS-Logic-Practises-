<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FizzBuzz</title>
</head>

<body>
    <script>
        /* 3. Fizzbuzz */
        let number = 3;

        function FizzBuzz(number) {
            if (number % 3 === 0 && number % 5 === 0) {
                console.log("FizzBuzz");
            }

            else if (number % 3 === 0) {
                console.log("Fizz");

            }

            else if (number % 5 === 0) {
                console.log("Buzz");

            }
        }

        FizzBuzz(number);
    </script>
</body>

</html>
